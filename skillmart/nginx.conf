server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  # SPA route fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: cache static assets a bit
  location ~* \.(?:js|css|woff2|png|jpg|jpeg|gif|ico|svg)$ {
    expires 1y;
    access_log off;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}

